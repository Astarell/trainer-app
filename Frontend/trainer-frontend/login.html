<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Trainer App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="min-h-screen bg-slate-950 flex items-center justify-center">
    <div class="max-w-md w-full p-8 card">
        <h1 class="text-4xl font-bold text-cyan-400 text-center mb-8">Вход в аккаунт</h1>
        
        <input id="loginEmail" type="email" placeholder="Email" value="user@example.com"
               class="w-full p-4 mb-4 bg-slate-900 rounded-xl text-white">
        
        <input id="loginPass" type="password" placeholder="Пароль" value="password"
               class="w-full p-4 mb-6 bg-slate-900 rounded-xl text-white">
        
        <button onclick="login()" 
                class="w-full btn btn-primary text-lg py-4">Войти</button>
        
        <p class="text-center mt-6 text-slate-400">
            Нет аккаунта? <a href="register.html" class="text-cyan-400 hover:underline">Зарегистрироваться</a>
        </p>
        
        <button onclick="logout()" 
                class="w-full mt-4 text-slate-400 hover:text-red-400 text-sm">
            Выйти (если токен есть)
        </button>
    </div>

    <script src="assets/js/common.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
